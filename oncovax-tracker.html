        --border-hover: #d0cfcb;
        --accent: #2d2d2b;

        --green-text: #2d6a1e;
        --blue-bg: #e3eff8;
        --blue-text: #1a5490;
        --amber-bg: #fdf3e1;
        --amber-text: #8a6514;
        --red-bg: #fce8e8;
        --red-text: #9a2e2e;
        --purple-bg: #eeedfb;
        --purple-text: #4a3fa0;
        --teal-bg: #e1f3ee;
        --teal-text: #0e6b53;
        --coral-bg: #faece7;
        --coral-text: #993c1d;
        --pink-bg: #fbeaf0;
        --pink-text: #993556;
      }

          --bg: #141413;
          --bg-card: #1c1c1a;
          --bg-surface: #222220;
          --bg-hover: #2a2a28;
          --text: #e8e7e3;
          --text-secondary: #9c9b96;
          --text-tertiary: #6b6a65;
          --border: #333330;
          --border-hover: #444440;
          --accent: #d4d3cf;

          --green-bg: #1a2e16;
          --green-text: #7fcf6a;
          --blue-bg: #142538;
          --blue-text: #6aabdf;
          --amber-bg: #2e2510;
          --amber-text: #d4a83a;
          --red-bg: #2e1616;
          --red-text: #e87070;
          --purple-bg: #1e1d30;
          --purple-text: #a9a0e0;
          --teal-bg: #0e2a22;
          --teal-text: #5dc0a0;

          --pink-text: #e080a0;

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "DM Sans",
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 920px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
      }

      header h1 {
        font-size: 18px;
        font-weight: 500;
        letter-spacing: -0.02em;
      }

      header .subtitle {
        font-size: 12px;
        color: var(--text-tertiary);
        font-family: "JetBrains Mono", monospace;
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 1.5rem;
      }

      .stat-card {
        background: var(--bg-surface);
        border-radius: 10px;
        padding: 14px 16px;
      }

      .stat-card .label {
        font-size: 11px;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 4px;
      }

      .stat-card .value {
        font-size: 26px;
        font-weight: 500;
        letter-spacing: -0.03em;
      }

      .stat-card .pct {
        color: var(--green-text);
      }

      .filters {
        display: flex;
        gap: 4px;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .filter-btn {
        font-size: 12px;
        font-family: "DM Sans", sans-serif;
        padding: 5px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-btn:hover {
        border-color: var(--border-hover);
        color: var(--text);
      }
      .filter-btn.active {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }

      .module {
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 8px;
        background: var(--bg-card);
        overflow: hidden;
        transition: border-color 0.15s;
      }

      .module:hover {
        border-color: var(--border-hover);
      }

      .module-header {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        cursor: pointer;
        user-select: none;
        gap: 12px;
      }

      .module-header:hover {
        background: var(--bg-hover);
      }

      .chevron {
        width: 16px;
        height: 16px;
        color: var(--text-tertiary);
        transition: transform 0.2s;
        flex-shrink: 0;
      }

      .chevron.open {
        transform: rotate(90deg);
      }

      .module-badge {
        font-size: 9px;
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 4px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .badge-core {
        background: var(--purple-bg);
        color: var(--purple-text);
      }
      .badge-intel {
        background: var(--blue-bg);
        color: var(--blue-text);
      }
      .badge-engine {
        background: var(--amber-bg);
        color: var(--amber-text);
      }
      .badge-care {
        background: var(--coral-bg);
        color: var(--coral-text);
      }
      .badge-access {
        background: var(--teal-bg);
        color: var(--teal-text);
      }
      .badge-survive {
        background: var(--pink-bg);
        color: var(--pink-text);
      }
      .badge-learn {
        background: var(--green-bg);
        color: var(--green-text);
      }

      .module-name {
        font-size: 14px;
        font-weight: 500;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .module-progress-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .module-fraction {
        font-size: 12px;
        font-family: "JetBrains Mono", monospace;
        color: var(--text-tertiary);
        min-width: 36px;
        text-align: right;
      }

      .progress-bar {
        width: 72px;
        height: 3px;
        background: var(--bg-surface);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: 2px;
        transition:
          width 0.3s,
          background 0.3s;
      }

      .sessions-list {
        padding: 0 16px 12px 16px;
      }

      .session-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-top: 1px solid var(--bg-surface);
      }

      .session-row:first-child {
        border-top: none;
      }

      .session-id {
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        color: var(--text-tertiary);
        min-width: 32px;
      }

      .session-name {
        font-size: 13px;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .session-weeks {
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        color: var(--text-tertiary);
        min-width: 44px;
        text-align: right;
      }

      .status-pill {
        font-size: 11px;
        font-family: "DM Sans", sans-serif;
        padding: 3px 12px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        min-width: 84px;
        text-align: center;
        transition: all 0.1s;
        font-weight: 500;
      }

      .status-pill:active {
        transform: scale(0.96);
      }

      .st-planned {
        background: var(--bg-surface);
        color: var(--text-tertiary);
      }
      .st-active {
        background: var(--blue-bg);
        color: var(--blue-text);
      }
      .st-complete {
        background: var(--green-bg);
        color: var(--green-text);
      }
      .st-blocked {
        background: var(--red-bg);
        color: var(--red-text);
      }
      .st-deferred {
        background: var(--amber-bg);
        color: var(--amber-text);
      }

      .note-row {
        padding: 0 0 6px 42px;
      }

      .note-input {
        width: 100%;
        font-size: 12px;
        font-family: "DM Sans", sans-serif;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 4px 8px;
        background: transparent;
        color: var(--text-secondary);
        transition: all 0.15s;
      }

      .note-input:hover {
        background: var(--bg-surface);
      }
      .note-input:focus {
        background: var(--bg-surface);
        border-color: var(--border);
        outline: none;
        color: var(--text);
      }
      .note-input::placeholder {
        color: var(--text-tertiary);
      }

      .export-row {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
      }

      .export-btn {
        font-size: 12px;
        font-family: "DM Sans", sans-serif;
        padding: 6px 16px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.15s;
      }

      .export-btn:hover {
        border-color: var(--border-hover);
        color: var(--text);
        background: var(--bg-surface);
      }

      @media (max-width: 640px) {
        .stats-row {
          grid-template-columns: repeat(3, 1fr);
        }
        .session-weeks {
          display: none;
        }
        .progress-bar {
          width: 48px;
        }
      }
    </style>
  </head>

      let state = { statuses: {}, notes: {}, expanded: {}, filter: "all" };

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) state = { ...state, ...JSON.parse(raw) };
        } catch (e) {}
        // Merge defaults — don't overwrite user edits
        for (const [k, v] of Object.entries(DEFAULT_STATUSES)) {
          if (!state.statuses[k]) state.statuses[k] = v;
        }
        for (const [k, v] of Object.entries(DEFAULT_NOTES)) {
          if (!state.notes[k]) state.notes[k] = v;
        }
      }

      function save() {
        try {
          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({
              statuses: state.statuses,
              notes: state.notes,
              expanded: state.expanded,
            }),
          );
          document.getElementById("last-updated").textContent =
            "saved " +
            new Date().toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
        } catch (e) {}
      }

      function key(m, s) {
        return m + ":" + s;
      }
      function getStatus(m, s) {
        return state.statuses[key(m, s)] || "planned";
      }

      function cycleStatus(m, s) {
        const k = key(m, s);
        const cur = state.statuses[k] || "planned";
        state.statuses[k] =
          STATUSES[(STATUSES.indexOf(cur) + 1) % STATUSES.length];
        save();
        render();
      }

      function toggle(id) {
        state.expanded[id] = !state.expanded[id];
        save();
        render();
      }

      function setNote(m, s, val) {
        state.notes[key(m, s)] = val;
        save();
      }

      function setFilter(f) {
        state.filter = f;
        render();
      }

      function moduleStats(mod) {
        let t = mod.sessions.length,
          c = 0,
          a = 0;
        mod.sessions.forEach((s) => {
          const st = getStatus(mod.id, s.id);
          if (st === "complete") c++;
          if (st === "active") a++;
        });
        return { t, c, a, pct: Math.round((c / t) * 100) };
      }

      function allStats() {
        let t = 0,
          c = 0,
          a = 0,
          b = 0;
        MODULES.forEach((m) =>
          m.sessions.forEach((s) => {
            t++;
            const st = getStatus(m.id, s.id);
            if (st === "complete") c++;
            if (st === "active") a++;
            if (st === "blocked") b++;
          }),
        );
        return { t, c, a, b, pct: t ? Math.round((c / t) * 100) : 0 };
      }

      function exportMarkdown() {
        let md = "# Build tracker status\n\n";
        md += `_Exported ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}_\n\n`;
        const a = allStats();
        md += `**${a.c}/${a.t} complete (${a.pct}%) — ${a.a} in progress — ${a.b} blocked**\n\n`;
        MODULES.forEach((m) => {
          const ms = moduleStats(m);
          md += `## ${m.name} (${ms.c}/${ms.t})\n\n`;
          md +=
            "| # | Session | Status | Notes |\n|---|---------|--------|-------|\n";
          m.sessions.forEach((s) => {
            const st = STATUS_LABELS[getStatus(m.id, s.id)];
            const note = (state.notes[key(m.id, s.id)] || "").replace(
              /\|/g,
              "\\|",
            );
            md += `| ${s.id} | ${s.name} | ${st} | ${note} |\n`;
          });
          md += "\n";
        });
        const blob = new Blob([md], { type: "text/markdown" });
        const url = URL.createObjectURL(blob);
        const a2 = document.createElement("a");
        a2.href = url;
        a2.download =
          "oncovax-tracker-" + new Date().toISOString().slice(0, 10) + ".md";
        a2.click();
        URL.revokeObjectURL(url);
      }

      function exportJSON() {
        const blob = new Blob([JSON.stringify(state, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download =
          "oncovax-tracker-" + new Date().toISOString().slice(0, 10) + ".json";
        a.click();
        URL.revokeObjectURL(url);
      }

      function importJSON() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = (e) => {
          const f = e.target.files[0];
          if (!f) return;
          const r = new FileReader();
          r.onload = (ev) => {
            try {
              const data = JSON.parse(ev.target.result);
              if (data.statuses) state.statuses = data.statuses;
              if (data.notes) state.notes = data.notes;
              if (data.expanded) state.expanded = data.expanded;
              save();
              render();
            } catch (err) {
              alert("Invalid JSON file");
            }
          };
          r.readAsText(f);
        };
        input.click();
      }

      const chevronSVG = `<svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg>`;

      function render() {
        const a = allStats();
        const filterMap = {
          all: () => true,
          core: (m) => m.badgeClass === "badge-core",
          intel: (m) => m.badgeClass === "badge-intel",
          engine: (m) => m.badgeClass === "badge-engine",
          care: (m) => m.badgeClass === "badge-care",
          access: (m) => m.badgeClass === "badge-access",
          survive: (m) => m.badgeClass === "badge-survive",
          learn: (m) => m.badgeClass === "badge-learn",
        };
        const fMods = MODULES.filter(filterMap[state.filter] || filterMap.all);

        let h = `<div class="stats-row">
    <div class="stat-card"><div class="label">Sessions</div><div class="value">${a.t}</div></div>
    <div class="stat-card"><div class="label">Complete</div><div class="value">${a.c}</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value">${a.a}</div></div>
    <div class="stat-card"><div class="label">Blocked</div><div class="value">${a.b}</div></div>
    <div class="stat-card"><div class="label">Progress</div><div class="value pct">${a.pct}%</div></div>
  </div>`;

        const filters = [
          ["all", "All"],
          ["core", "Core"],
          ["intel", "INTEL"],
          ["engine", "Engine"],
          ["care", "Care"],
          ["access", "Access"],
          ["survive", "Survivorship"],
          ["learn", "Learn"],
        ];
        h += `<div class="filters">${filters
          .map(
            ([f, l]) =>
              `<button class="filter-btn${state.filter === f ? " active" : ""}" onclick="setFilter('${f}')">${l}</button>`,
          )
          .join("")}</div>`;

        fMods.forEach((mod) => {
          const ms = moduleStats(mod);
          const open = state.expanded[mod.id];
          const barColor =
            ms.pct === 100
              ? "var(--green-text)"
              : ms.a > 0
                ? "var(--blue-text)"
                : "var(--text-tertiary)";

          h += `<div class="module">
      <div class="module-header" onclick="toggle('${mod.id}')">
        <svg class="chevron${open ? " open" : ""}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg>
        <span class="module-badge ${mod.badgeClass}">${mod.badge}</span>
        <span class="module-name">${mod.name}</span>
        <div class="module-progress-wrap">
          <span class="module-fraction">${ms.c}/${ms.t}</span>
          <div class="progress-bar"><div class="progress-fill" style="width:${ms.pct}%;background:${barColor}"></div></div>
        </div>
      </div>`;

          if (open) {
            h += `<div class="sessions-list">`;
            mod.sessions.forEach((s) => {
              const st = getStatus(mod.id, s.id);
              const note = state.notes[key(mod.id, s.id)] || "";
              h += `<div>
          <div class="session-row">
            <span class="session-id">${s.id}</span>
            <span class="session-name">${s.name}</span>
            <span class="session-weeks">${s.weeks}</span>
            <button class="status-pill st-${st}" onclick="cycleStatus('${mod.id}','${s.id}')">${STATUS_LABELS[st]}</button>
          </div>
          <div class="note-row">
            <input class="note-input" placeholder="Add notes..." value="${note.replace(/"/g, "&quot;")}"
              onchange="setNote('${mod.id}','${s.id}',this.value)" />
          </div>
        </div>`;
            });
            h += `</div>`;
          }
          h += `</div>`;
        });

        h += `<div class="export-row">
    <button class="export-btn" onclick="importJSON()">Import JSON</button>
    <button class="export-btn" onclick="exportJSON()">Export JSON</button>
    <button class="export-btn" onclick="exportMarkdown()">Export markdown</button>
  </div>`;

        document.getElementById("app").innerHTML = h;
      }

      load();
      render();
    </script>
  </body>
</html>
