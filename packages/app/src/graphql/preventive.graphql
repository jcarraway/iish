query GetReferralStats {
  referralStats {
    totalSent
    totalRedeemed
  }
}

mutation GenerateFamilyReferralLink {
  generateFamilyReferralLink {
    referralCode
    url
    textMessage
    emailSubject
    emailBody
  }
}

mutation RedeemReferralCode($code: String!) {
  redeemReferralCode(code: $code) {
    success
    prefillFamilyHistory
  }
}
