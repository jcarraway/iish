query GetPreventiveTrials($category: String) {
  preventiveTrials(category: $category) {
    id
    nctId
    title
    trialCategory
    phase
    status
    sponsor
    briefSummary
    curatedSummary
    targetPopulation
    vaccineTarget
    mechanism
    keyResults
    editorNote
    matchingCriteria
  }
}

query RunPreventivePrescreen($input: PreventivePrescreenInput!) {
  preventivePrescreen(input: $input) {
    matchedTrials {
      trial {
        id
        nctId
        title
        trialCategory
        phase
        status
        sponsor
        briefSummary
        curatedSummary
        targetPopulation
        vaccineTarget
        mechanism
        keyResults
        editorNote
      }
      matchStrength
      matchReason
      nextSteps
    }
    totalPreventiveTrials
    noMatchMessage
    riskAssessmentCTA
  }
}

