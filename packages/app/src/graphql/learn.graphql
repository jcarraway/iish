# ============================================================================
# Learn — Public Queries
# ============================================================================

query GetArticle($slug: String!) {
  article(slug: $slug) {
    id
    slug
    type
    title
    metaTitle
    metaDescription
    patientSummary
    keyTakeaways
    patientContent {
      heading
      body
    }
    clinicalContent {
      heading
      body
    }
    actionItems {
      text
      link
    }
    keyStatistics {
      label
      value
      source
    }
    references
    cancerTypes
    breastSubtypes
    biomarkers
    treatmentClasses
    journeyStages
    audienceLevel
    category
    primaryKeyword
    secondaryKeywords
    relatedArticleSlugs
    glossaryTerms
    viewCount
    publishedAt
    createdAt
  }
}

query GetArticles($filters: ArticleFilters) {
  articles(filters: $filters) {
    id
    slug
    type
    title
    patientSummary
    keyTakeaways
    cancerTypes
    breastSubtypes
    journeyStages
    audienceLevel
    category
    viewCount
    publishedAt
  }
}

query GetArticlesByCategory($category: String!) {
  articlesByCategory(category: $category) {
    label
    description
    articles {
      id
      slug
      type
      title
      patientSummary
      keyTakeaways
      journeyStages
      audienceLevel
      viewCount
      publishedAt
    }
  }
}

query SearchArticles($query: String!, $filters: ArticleFilters) {
  searchArticles(query: $query, filters: $filters) {
    id
    slug
    type
    title
    patientSummary
    category
    publishedAt
  }
}

query GetGlossaryTerms($category: String) {
  glossaryTerms(category: $category) {
    id
    term
    slug
    shortDefinition
    fullDefinition
    fullArticleSlug
    aliases
    category
  }
}

query GetGlossaryTerm($slug: String!) {
  glossaryTerm(slug: $slug) {
    id
    term
    slug
    shortDefinition
    fullDefinition
    fullArticleSlug
    aliases
    category
  }
}

# ============================================================================
# Learn — Authenticated Queries
# ============================================================================

query GetReadingPlan {
  readingPlan {
    readNow {
      articleSlug
      articleTitle
      reason
      priority
    }
    readSoon {
      articleSlug
      articleTitle
      reason
      priority
    }
    whenReady {
      articleSlug
      articleTitle
      reason
      priority
    }
  }
}

query GetArticlesAdmin($filters: ArticleAdminFilters) {
  articlesAdmin(filters: $filters) {
    id
    slug
    type
    title
    patientSummary
    category
    status
    viewCount
    publishedAt
    createdAt
  }
}

# ============================================================================
# Learn — Mutations
# ============================================================================

mutation GenerateArticle($input: GenerateArticleInput!) {
  generateArticle(input: $input) {
    id
    slug
    title
    status
    category
    createdAt
  }
}

mutation PublishArticle($articleId: String!) {
  publishArticle(articleId: $articleId) {
    id
    slug
    status
    publishedAt
  }
}

mutation GeneratePersonalizedContext($slug: String!) {
  generatePersonalizedContext(slug: $slug) {
    content
    generatedAt
  }
}

mutation GenerateReadingPlan {
  generateReadingPlan {
    readNow {
      articleSlug
      articleTitle
      reason
      priority
    }
    readSoon {
      articleSlug
      articleTitle
      reason
      priority
    }
    whenReady {
      articleSlug
      articleTitle
      reason
      priority
    }
  }
}

mutation UpdateArticleStatus($articleId: String!, $status: String!, $notes: String) {
  updateArticleStatus(articleId: $articleId, status: $status, notes: $notes) {
    id
    slug
    status
    publishedAt
  }
}

mutation CheckArticleQuality($articleId: String!) {
  checkArticleQuality(articleId: $articleId) {
    issues {
      type
      severity
      description
      section
    }
    score
    checkedAt
  }
}

mutation RunArticleQualityChecks {
  runArticleQualityChecks
}

mutation InsertPlatformLinks($articleId: String!) {
  insertPlatformLinks(articleId: $articleId) {
    id
    slug
    actionItems {
      text
      link
    }
  }
}

# ============================================================================
# Learn — INTEL Cross-Links (public)
# ============================================================================

query GetRelatedResearch($slug: String!, $limit: Int) {
  relatedResearch(slug: $slug, limit: $limit) {
    id
    title
    maturityTier
    patientSummary
    publishedAt
    sourceType
    practiceImpact
  }
}

query GetArticlesForResearchItem($itemId: String!, $limit: Int) {
  articlesForResearchItem(itemId: $itemId, limit: $limit) {
    slug
    title
    category
    patientSummary
    viewCount
  }
}

# ============================================================================
# Learn — INTEL Refresh Pipeline (authenticated)
# ============================================================================

query GetArticleRefreshStatus($articleId: String!) {
  articleRefreshStatus(articleId: $articleId) {
    needsRefresh
    urgency
    triggers {
      id
      title
      maturityTier
      practiceImpact
      publishedAt
    }
    suggestion {
      sectionsToUpdate
      newDataToIncorporate
      referencesToAdd
      summary
    }
  }
}

query GetArticleEngagement {
  articleEngagement {
    id
    slug
    title
    category
    viewCount
    publishedAt
  }
}

mutation GenerateRefreshSuggestion($articleId: String!, $triggerItemIds: [String!]!) {
  generateRefreshSuggestion(articleId: $articleId, triggerItemIds: $triggerItemIds) {
    sectionsToUpdate
    newDataToIncorporate
    referencesToAdd
    summary
  }
}

mutation RunRefreshCheckCycle {
  runRefreshCheckCycle
}
