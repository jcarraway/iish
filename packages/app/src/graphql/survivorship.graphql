query GetSurvivorshipPlan {
  survivorshipPlan {
    id
    patientId
    treatmentCompletionDate
    completionType
    ongoingTherapies
    planContent
    riskCategory
    currentPhase
    lastGeneratedAt
    nextReviewDate
    createdAt
  }
}

query GetSurveillanceSchedule {
  surveillanceSchedule {
    id
    patientId
    planId
    type
    title
    description
    frequency
    guidelineSource
    dueDate
    status
    completedDate
    resultSummary
    nextDueDate
    createdAt
  }
}

query GetJournalEntries($limit: Int) {
  journalEntries(limit: $limit) {
    id
    patientId
    entryDate
    energy
    pain
    mood
    sleepQuality
    hotFlashes
    jointPain
    newSymptoms
    exerciseType
    exerciseMinutes
    medicationsTaken
    notes
    createdAt
  }
}

query GetJournalTrends($days: Int!) {
  journalTrends(days: $days) {
    averageEnergy
    averagePain
    averageMood
    averageSleep
    energyDelta
    painDelta
    moodDelta
    sleepDelta
    streak
    totalEntries
    entries {
      id
      patientId
      entryDate
      energy
      pain
      mood
      sleepQuality
      hotFlashes
      jointPain
      newSymptoms
      exerciseType
      exerciseMinutes
      notes
      createdAt
    }
  }
}

