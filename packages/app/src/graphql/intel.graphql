# ============================================================================
# Intel — Research Intelligence
# ============================================================================

query GetResearchItems($filters: ResearchItemFilters) {
  researchItems(filters: $filters) {
    id
    sourceType
    sourceUrl
    sourceCredibility
    title
    journalName
    doi
    publishedAt
    cancerTypes
    breastSubtypes
    maturityTier
    domains
    treatmentClasses
    biomarkerRelevance
    evidenceLevel
    practiceImpact
    patientSummary
    drugNames
    hypeScore
    hypeFlags
    retractionStatus
    classificationStatus
    createdAt
  }
}

query GetResearchItem($id: String!) {
  researchItem(id: $id) {
    id
    sourceType
    sourceItemId
    sourceUrl
    sourceCredibility
    title
    rawContent
    authors
    institutions
    journalName
    doi
    publishedAt
    cancerTypes
    breastSubtypes
    maturityTier
    domains
    treatmentClasses
    biomarkerRelevance
    treatmentStages
    evidenceLevel
    practiceImpact
    classificationConfidence
    patientSummary
    clinicianSummary {
      headline
      keyEndpoints
      studyDesign
      context
      practiceImplication
      limitations
      grade
    }
    keyEndpoints
    drugNames
    trialNctIds
    retractionStatus
    industrySponsored
    sponsorName
    authorCOI
    hypeScore
    hypeFlags
    relatedItemIds
    contradictedBy
    classificationStatus
    createdAt
  }
}

query SearchResearch($query: String!, $filters: ResearchItemFilters) {
  searchResearch(query: $query, filters: $filters) {
    id
    sourceType
    sourceUrl
    sourceCredibility
    title
    journalName
    doi
    publishedAt
    cancerTypes
    breastSubtypes
    maturityTier
    domains
    treatmentClasses
    evidenceLevel
    practiceImpact
    patientSummary
    drugNames
    hypeFlags
    retractionStatus
    classificationStatus
    createdAt
  }
}

query GetIngestionSyncStates {
  ingestionSyncStates {
    sourceId
    lastSyncAt
    lastItemDate
    itemsIngestedTotal
    itemsIngestedLastRun
    lastError
  }
}

mutation TriggerIngestion($sourceId: String!) {
  triggerIngestion(sourceId: $sourceId) {
    ingested
    classified
    summarized
    skipped
    errors
  }
}

mutation ReclassifyItem($itemId: String!) {
  reclassifyItem(itemId: $itemId) {
    id
    maturityTier
    domains
    evidenceLevel
    practiceImpact
    patientSummary
    classificationStatus
  }
}

mutation RunQCPipeline($batchSize: Int) {
  runQCPipeline(batchSize: $batchSize) {
    checked
    retracted
    contradictions
    errors
  }
}

mutation MigrateOldTaxonomy {
  migrateOldTaxonomy {
    practiceImpactUpdated
    breastSubtypesUpdated
  }
}

# ============================================================================
# Intel — Feed Personalization (I4)
# ============================================================================

query GetPersonalizedFeed($filters: PersonalizedFeedFilters) {
  personalizedFeed(filters: $filters) {
    items {
      item {
        id
        sourceType
        sourceUrl
        sourceCredibility
        title
        journalName
        doi
        publishedAt
        cancerTypes
        breastSubtypes
        maturityTier
        domains
        treatmentClasses
        biomarkerRelevance
        evidenceLevel
        practiceImpact
        patientSummary
        drugNames
        hypeScore
        hypeFlags
        retractionStatus
        classificationStatus
        createdAt
      }
      relevanceScore
      personalizedNote
      viewed
      saved
      dismissed
    }
    total
    hasMore
  }
}

query GetPersonalizedNote($itemId: String!) {
  personalizedNote(itemId: $itemId) {
    itemId
    note
  }
}

query GetFeedConfig {
  feedConfig {
    id
    audienceType
    contentDepth
    showPreclinical
    showNegativeResults
    digestFrequency
  }
}

mutation MarkItemViewed($itemId: String!) {
  markItemViewed(itemId: $itemId)
}

mutation MarkItemSaved($itemId: String!, $saved: Boolean!) {
  markItemSaved(itemId: $itemId, saved: $saved)
}

mutation MarkItemDismissed($itemId: String!) {
  markItemDismissed(itemId: $itemId)
}

mutation UpdateFeedConfig($input: UpdateFeedConfigInput!) {
  updateFeedConfig(input: $input) {
    id
    audienceType
    contentDepth
    showPreclinical
    showNegativeResults
    digestFrequency
  }
}

mutation ComputeRelevanceScores {
  computeRelevanceScores
}

# ============================================================================
# Intel — Community Intelligence (I5)
# ============================================================================

query GetCommunityReports {
  communityReports {
    id
    patientId
    reportType
    consentScope
    structuredData
    narrative
    moderationStatus
    verified
    relatedDrug
    relatedTrialNctId
    relatedItemId
    createdAt
  }
}

query GetCommunityInsights($drugName: String!) {
  communityInsights(drugName: $drugName) {
    drugName
    totalReports
    averageRating
    commonSideEffects {
      effect
      reportedByPercent
      averageSeverity
      averageOnset
      resolvedPercent
      topManagementTips
    }
    trialSummary {
      totalReports
      averageRating
      commonPros
      commonCons
    }
  }
}

query GetCommunityInsightsForItem($itemId: String!) {
  communityInsightsForItem(itemId: $itemId) {
    drugName
    totalReports
    averageRating
    commonSideEffects {
      effect
      reportedByPercent
      averageSeverity
      averageOnset
      resolvedPercent
      topManagementTips
    }
    trialSummary {
      totalReports
      averageRating
      commonPros
      commonCons
    }
  }
}

query GetDigestPreview {
  digestPreview {
    urgent {
      itemId
      headline
      summary
      maturityBadge
      relevanceReason
      viewUrl
    }
    personallyRelevant {
      itemId
      headline
      summary
      maturityBadge
      relevanceReason
      viewUrl
    }
    landscapeHighlights {
      itemId
      headline
      summary
      maturityBadge
      relevanceReason
      viewUrl
    }
    communityHighlights {
      itemId
      headline
      summary
      maturityBadge
      relevanceReason
      viewUrl
    }
    trialUpdates {
      itemId
      headline
      summary
      maturityBadge
      relevanceReason
      viewUrl
    }
    totalNewItems
  }
}

mutation SubmitCommunityReport($input: SubmitCommunityReportInput!) {
  submitCommunityReport(input: $input) {
    id
    reportType
    consentScope
    structuredData
    narrative
    moderationStatus
    verified
    relatedDrug
    relatedTrialNctId
    createdAt
  }
}

mutation ModerateCommunityReport($reportId: String!, $status: String!) {
  moderateCommunityReport(reportId: $reportId, status: $status) {
    id
    moderationStatus
  }
}

mutation UpdateDigestPreferences($frequency: String) {
  updateDigestPreferences(frequency: $frequency) {
    id
    audienceType
    contentDepth
    showPreclinical
    showNegativeResults
    digestFrequency
  }
}

# ============================================================================
# Intel — Landscape Views (I6)
# ============================================================================

query GetLandscapeOverview {
  landscapeOverview {
    totalItems
    maturityDistribution
    domainDistribution
    subtypeDistribution
    treatmentClassDistribution
    recentHighlights {
      id
      sourceType
      title
      maturityTier
      practiceImpact
      patientSummary
      drugNames
      publishedAt
    }
    lastUpdated
  }
}

query GetSubtypeLandscape($subtype: String!) {
  subtypeLandscape(subtype: $subtype) {
    subtype
    subtypeLabel
    totalItems
    maturityDistribution
    domainDistribution
    standardOfCare {
      subtype
      currentSOC
      whatsChanging
      whatsComing
      whatsBeingExplored
      generatedAt
    }
    availableNow {
      id
      title
      maturityTier
      practiceImpact
      patientSummary
      drugNames
      publishedAt
    }
    expectedSoon {
      id
      title
      maturityTier
      practiceImpact
      patientSummary
      drugNames
      publishedAt
    }
    inTrials {
      id
      title
      maturityTier
      practiceImpact
      patientSummary
      drugNames
      publishedAt
    }
    earlyResearch {
      id
      title
      maturityTier
      practiceImpact
      patientSummary
      drugNames
      publishedAt
    }
    topDrugs {
      drugName
      maturityTier
      treatmentClass
      itemCount
      latestItemId
      latestItemTitle
      latestPublishedAt
    }
  }
}

query GetTreatmentPipeline($subtype: String) {
  treatmentPipeline(subtype: $subtype) {
    drugName
    maturityTier
    treatmentClass
    itemCount
    latestItemId
    latestItemTitle
    latestPublishedAt
  }
}

query GetRecentDevelopments($subtype: String, $days: Int) {
  recentDevelopments(subtype: $subtype, days: $days) {
    id
    sourceType
    title
    maturityTier
    practiceImpact
    patientSummary
    drugNames
    publishedAt
  }
}

query GetTranslatorUpdates {
  translatorUpdates {
    hasUpdates
    items {
      id
      title
      maturityTier
      practiceImpact
      drugNames
      publishedAt
    }
    count
    since
  }
}

query GetFinancialUpdates {
  financialUpdates {
    newApprovals {
      id
      title
      maturityTier
      practiceImpact
      drugNames
      publishedAt
    }
    hasPAPOpportunities
  }
}

query GetSurvivorshipUpdates {
  survivorshipUpdates {
    lateEffectsItems {
      id
      title
      maturityTier
      domains
      patientSummary
      publishedAt
    }
    ctdnaItems {
      id
      title
      maturityTier
      treatmentClasses
      patientSummary
      publishedAt
    }
    hasUpdates
  }
}

mutation GenerateStandardOfCare($subtype: String!) {
  generateStandardOfCare(subtype: $subtype) {
    subtype
    currentSOC
    whatsChanging
    whatsComing
    whatsBeingExplored
    generatedAt
  }
}
