# ============================================================================
# Intel — Research Intelligence
# ============================================================================

query GetResearchItems($filters: ResearchItemFilters) {
  researchItems(filters: $filters) {
    id
    sourceType
    sourceUrl
    sourceCredibility
    title
    journalName
    doi
    publishedAt
    cancerTypes
    breastSubtypes
    maturityTier
    domains
    treatmentClasses
    biomarkerRelevance
    evidenceLevel
    practiceImpact
    patientSummary
    drugNames
    hypeScore
    hypeFlags
    retractionStatus
    classificationStatus
    createdAt
  }
}

query GetResearchItem($id: String!) {
  researchItem(id: $id) {
    id
    sourceType
    sourceItemId
    sourceUrl
    sourceCredibility
    title
    rawContent
    authors
    institutions
    journalName
    doi
    publishedAt
    cancerTypes
    breastSubtypes
    maturityTier
    domains
    treatmentClasses
    biomarkerRelevance
    treatmentStages
    evidenceLevel
    practiceImpact
    classificationConfidence
    patientSummary
    clinicianSummary {
      headline
      keyEndpoints
      studyDesign
      context
      practiceImplication
      limitations
      grade
    }
    keyEndpoints
    drugNames
    trialNctIds
    retractionStatus
    industrySponsored
    sponsorName
    authorCOI
    hypeScore
    hypeFlags
    relatedItemIds
    contradictedBy
    classificationStatus
    createdAt
  }
}

query SearchResearch($query: String!, $filters: ResearchItemFilters) {
  searchResearch(query: $query, filters: $filters) {
    id
    sourceType
    sourceUrl
    sourceCredibility
    title
    journalName
    doi
    publishedAt
    cancerTypes
    breastSubtypes
    maturityTier
    domains
    treatmentClasses
    evidenceLevel
    practiceImpact
    patientSummary
    drugNames
    hypeFlags
    retractionStatus
    classificationStatus
    createdAt
  }
}

query GetIngestionSyncStates {
  ingestionSyncStates {
    sourceId
    lastSyncAt
    lastItemDate
    itemsIngestedTotal
    itemsIngestedLastRun
    lastError
  }
}

mutation TriggerIngestion($sourceId: String!) {
  triggerIngestion(sourceId: $sourceId) {
    ingested
    classified
    summarized
    skipped
    errors
  }
}

mutation ReclassifyItem($itemId: String!) {
  reclassifyItem(itemId: $itemId) {
    id
    maturityTier
    domains
    evidenceLevel
    practiceImpact
    patientSummary
    classificationStatus
  }
}

mutation RunQCPipeline($batchSize: Int) {
  runQCPipeline(batchSize: $batchSize) {
    checked
    retracted
    contradictions
    errors
  }
}

mutation MigrateOldTaxonomy {
  migrateOldTaxonomy {
    practiceImpactUpdated
    breastSubtypesUpdated
  }
}

# ============================================================================
# Intel — Feed Personalization (I4)
# ============================================================================

query GetPersonalizedFeed($filters: PersonalizedFeedFilters) {
  personalizedFeed(filters: $filters) {
    items {
      item {
        id
        sourceType
        sourceUrl
        sourceCredibility
        title
        journalName
        doi
        publishedAt
        cancerTypes
        breastSubtypes
        maturityTier
        domains
        treatmentClasses
        biomarkerRelevance
        evidenceLevel
        practiceImpact
        patientSummary
        drugNames
        hypeScore
        hypeFlags
        retractionStatus
        classificationStatus
        createdAt
      }
      relevanceScore
      personalizedNote
      viewed
      saved
      dismissed
    }
    total
    hasMore
  }
}

query GetPersonalizedNote($itemId: String!) {
  personalizedNote(itemId: $itemId) {
    itemId
    note
  }
}

query GetFeedConfig {
  feedConfig {
    id
    audienceType
    contentDepth
    showPreclinical
    showNegativeResults
  }
}

mutation MarkItemViewed($itemId: String!) {
  markItemViewed(itemId: $itemId)
}

mutation MarkItemSaved($itemId: String!, $saved: Boolean!) {
  markItemSaved(itemId: $itemId, saved: $saved)
}

mutation MarkItemDismissed($itemId: String!) {
  markItemDismissed(itemId: $itemId)
}

mutation UpdateFeedConfig($input: UpdateFeedConfigInput!) {
  updateFeedConfig(input: $input) {
    id
    audienceType
    contentDepth
    showPreclinical
    showNegativeResults
  }
}

mutation ComputeRelevanceScores {
  computeRelevanceScores
}
